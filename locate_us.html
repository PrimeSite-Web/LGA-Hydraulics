<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locate Us - LGA Hydraulics</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('https://www.ernestlowe.co.za/images/hydraulics-division.webp') no-repeat center center fixed;
            background-size: cover;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            max-width: 90%;
            color: white;
        }

        h1, h3 {
            margin: 10px 0;
        }

        iframe {
            width: 100%;
            max-width: 600px;
            height: 400px;
            border-radius: 10px;
            border: 2px solid white;
        }

        img {
            width: 100%;
            max-width: 600px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: rgba(128, 128, 128, 0.8);
            color: white;
            text-decoration: none;
            font-size: 18px;
            border-radius: 5px;
            transition: 0.3s;
        }

        .button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 600px) {
            .container {
                max-width: 95%;
                padding: 15px;
            }

            h1 {
                font-size: 24px;
            }

            h3 {
                font-size: 18px;
            }

            iframe, img {
                max-width: 100%;
                height: auto;
            }

            .button {
                font-size: 16px;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Locate Us</h1>
        <p>Visit us at:</p>
        <h3>91 Haupt Street, Sidwell, Gqeberha, 6020</h3>

        <!-- Embedded Google Map -->
        <iframe 
            src="https://maps.google.com/maps?q=91%20Haupt%20Street,%20Sidwell,%20Gqeberha,%206020&output=embed">
        </iframe>

        <p>Here's how our location looks:</p>

    </div>

</html>
